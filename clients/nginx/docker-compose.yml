  # Nginx 反向代理服务 用于做SSL  
  nginx:  
    image: registry.cn-hangzhou.aliyuncs.com/fafucoder/nginx:alpine
    container_name: hidden-price-nginx  
    restart: always  
    ports:  
      - '5000:80'  
    volumes:  
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro  
      - ./nginx/conf.d:/etc/nginx/conf.d:ro  
      - ./nginx/logs:/var/log/nginx  
    networks:  
      - hidden-price-network

